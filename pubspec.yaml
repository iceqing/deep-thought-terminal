name: deep_thought
description: A terminal emulator application inspired by Termux, built with Flutter.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  xterm: ^4.0.0
  flutter_pty: ^0.4.1
  google_fonts: ^6.1.0
  provider: ^6.1.1
  shared_preferences: ^2.2.0
  wakelock_plus: ^1.1.0
  archive: ^3.4.10
  http: ^1.1.0
  path: ^1.8.3
  path_provider: ^2.1.1
  permission_handler: ^11.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/bootstrap-aarch64.zip
    - assets/bootstrap-x86_64.zip
  fonts:
    # Nerd Font MONO variants - all glyphs forced to single-width
    - family: JetBrainsMonoNerdFontMono
      fonts:
        - asset: assets/fonts/JetBrainsMonoNerdFontMono-Regular.ttf
    - family: FiraCodeNerdFontMono
      fonts:
        - asset: assets/fonts/FiraCodeNerdFontMono-Regular.ttf
    - family: HackNerdFontMono
      fonts:
        - asset: assets/fonts/HackNerdFontMono-Regular.ttf
    - family: SourceCodeProNerdFontMono
      fonts:
        - asset: assets/fonts/SauceCodeProNerdFontMono-Regular.ttf
    - family: UbuntuMonoNerdFontMono
      fonts:
        - asset: assets/fonts/UbuntuMonoNerdFontMono-Regular.ttf
    - family: CascadiaCodeNerdFontMono
      fonts:
        - asset: assets/fonts/CaskaydiaCoveNerdFontMono-Regular.ttf
